  <body>
    <div id="root"></div>
    <script>
      // Temporary hard-disable PWA artifacts after the push rollout caused
      // stale-cache loading loops. This must run before the React bundle.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations()
          .then(function (registrations) {
            registrations.forEach(function (registration) { registration.unregister(); });
          })
          .catch(function () {});
      }
      if (window.caches) {
        window.caches.keys()
          .then(function (names) {
            return Promise.all(names.map(function (name) { return window.caches.delete(name); }));
          })
          .catch(function () {});
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
